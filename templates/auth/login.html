{% extends "base.html" %}
{% block content %}
<section class="auth-layout">
  <div class="auth-poster">
    <p class="eyebrow">Pulseboard</p>
    <h1>Build better days from the habits you can actually measure.</h1>
    <p>Track tasks, focus sessions, hobbies, and productivity trends in one clean local workspace.</p>
  </div>

  <form class="auth-form" method="post">
    <h2>Sign in</h2>
    <label>Username or email<input name="login" placeholder="Enter username or email" required></label>
    <label>Password<input type="password" name="password" placeholder="Enter password" required></label>
    <button type="submit">Enter workspace</button>
    <p class="form-note">Admin demo: <strong>admin</strong> / <strong>admin123</strong></p>
    <p class="form-note">Need an account? <a href="{{ url_for('app_routes.register') }}">Create one</a></p>
  </form>
</section>
{% endblock %}
